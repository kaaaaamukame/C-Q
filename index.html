<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#263245" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="綜合類刷題" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>綜合類刷題系統</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button class="icon-btn" id="homeBtn" title="首頁">⌂</button>
      <div>
        <h1>綜合類刷題系統</h1>
        <p id="subTitle">手機版 V5｜指定科目練習</p>
      </div>
      <button class="icon-btn" id="themeBtn" title="切換深色模式">◐</button>
    </header>

    <main id="screen" class="screen"></main>

    <nav class="bottom-nav">
      <button data-route="home" class="nav-active">首頁</button>
      <button data-route="quiz">刷題</button>
      <button data-route="wrong">錯題</button>
      <button data-route="stats">統計</button>
      <button data-route="settings">設定</button>
    </nav>
  </div>

  <template id="loadingTpl">
    <section class="card center">
      <div class="loader"></div>
      <p>載入題庫中…</p>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
